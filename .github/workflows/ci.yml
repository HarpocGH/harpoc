name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - name: Enable Linux keystore tiers (keyutils + Secret Service)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y keyutils gnome-keyring libsecret-tools dbus-x11
      - name: Probe Linux keystores (diagnostic)
        if: runner.os == 'Linux'
        run: |
          which keyctl secret-tool || true
          keyctl link @u @s || echo "::warning::keyctl link @u @s failed"
          echo 746573746b6579 | keyctl padd user harpoc-ci-probe @u || echo "::warning::kernel keyring probe failed"
          keyctl search @u user harpoc-ci-probe || true
          keyctl purge user harpoc-ci-probe || true
      - name: Probe network isolation (diagnostic)
        if: runner.os == 'Linux'
        # Ubuntu 24.04 restricts unprivileged user namespaces via AppArmor
        # (apparmor_restrict_unprivileged_userns). The suite's live probe
        # skips gracefully either way; this step surfaces the real error so
        # a skipped leg is diagnosable from the log. If it reports denial,
        # relax the restriction for the runner:
        #   sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
        run: |
          sysctl kernel.apparmor_restrict_unprivileged_userns 2>/dev/null || true
          unshare -rn -- /bin/true && echo "unshare -rn OK" || {
            echo "::warning::unshare -rn probe failed — relaxing AppArmor userns restriction"
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
            unshare -rn -- /bin/true && echo "unshare -rn OK after sysctl" || echo "::warning::unshare -rn still failing"
          }
      - name: Probe network isolation (diagnostic)
        if: runner.os == 'macOS'
        run: /usr/bin/sandbox-exec -p '(version 1)(allow default)(deny network*)' /usr/bin/true && echo "sandbox-exec OK" || echo "::warning::sandbox-exec probe failed"
      - name: Provision disposable unlocked macOS test keychain
        if: runner.os == 'macOS'
        run: |
          security create-keychain -p harpoc-ci harpoc-ci.keychain
          security unlock-keychain -p harpoc-ci harpoc-ci.keychain
          security set-keychain-settings harpoc-ci.keychain
          echo "HARPOC_TEST_KEYCHAIN=$HOME/Library/Keychains/harpoc-ci.keychain-db" >> "$GITHUB_ENV"
      - run: pnpm install
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint
      - name: Test (Windows, native OpenSSH client required for the ssh-live tier)
        if: runner.os == 'Windows'
        env:
          HARPOC_REQUIRE_PLATFORM_TESTS: ssh-live
        run: pnpm test
      # HARPOC_REQUIRE_PLATFORM_TESTS turns a failed availability probe on a
      # provisioned tier into a test FAILURE instead of a silent skip — a
      # regressed provisioning step above must not drop real-path coverage to
      # zero while the leg stays green (review T3).
      - name: Test (macOS, keychain + sandbox-exec tiers required)
        if: runner.os == 'macOS'
        env:
          HARPOC_REQUIRE_PLATFORM_TESTS: keychain,isolation,ssh-live
        run: pnpm test
      - name: Test (Linux, D-Bus session with unlocked keyring — required Secret Service/keyring/isolation)
        if: runner.os == 'Linux'
        # keyctl link @u @s grants the CI shell possession of the user keyring
        # (non-login processes lack the pam_keyinit link, so @u operations get
        # EACCES without it); gnome-keyring provides the Secret Service.
        env:
          HARPOC_REQUIRE_PLATFORM_TESTS: secret-service,keyring,isolation,ssh-live
        run: dbus-run-session -- sh -c 'echo harpoc-ci | gnome-keyring-daemon --unlock; keyctl link @u @s || true; pnpm test'
      - run: pnpm format:check
